<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitness">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Fitness</title>
</head>
<body>
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="sketchy">
        <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <header id="app-header">
    <div class="header-left">
      <span class="app-title">Fitness</span>
      <span class="header-date" id="header-date"></span>
    </div>
    <div class="streak-badge" id="streak-badge">🔥 0</div>
  </header>

  <main id="app"></main>

  <nav class="nav-bar" id="nav-bar">
    <button data-page="today" onclick="navigate('today')">
      <span class="nav-icon">✦</span>
      <span>Today</span>
    </button>
    <button data-page="routines" onclick="navigate('routines')">
      <span class="nav-icon">⊞</span>
      <span>Routines</span>
    </button>
    <button data-page="runs" onclick="navigate('runs')">
      <span class="nav-icon">⤳</span>
      <span>Runs</span>
    </button>
    <button data-page="progress" onclick="navigate('progress')">
      <span class="nav-icon">↗</span>
      <span>Progress</span>
    </button>
    <button data-page="benchmarks" onclick="navigate('benchmarks')">
      <span class="nav-icon">◎</span>
      <span>PRs</span>
    </button>
    <button data-page="settings" onclick="navigate('settings')">
      <span class="nav-icon">⚙</span>
      <span>Settings</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
